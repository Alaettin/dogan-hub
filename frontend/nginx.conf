server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA-Fallback: alle unbekannten Routes auf index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Static assets: lange Cache-Zeit (Vite hash-named bundles)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
