services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-}
    depends_on:
      - frontend
      - backend

  frontend:
    build: ./frontend
    restart: unless-stopped
    expose:
      - "80"

  backend:
    build: ./backend
    restart: unless-stopped
    expose:
      - "4000"
    env_file: .env
    # Logs persistent halten — überleben Container-Neustarts.
    # pino-roll rotiert täglich, behält 14 Tage (siehe lib/logger.ts).
    # Override LOG_FILE_PATH in .env wenn anderer Pfad gewünscht.
    environment:
      LOG_FILE_PATH: ${LOG_FILE_PATH:-/app/logs/app.log}
    volumes:
      - backend_logs:/app/logs

volumes:
  caddy_data:
  caddy_config:
  backend_logs:
