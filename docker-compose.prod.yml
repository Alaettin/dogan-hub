# Production-Compose für VMs mit BEREITS LAUFENDEM Reverse-Proxy (z.B. Host-Caddy).
# Startet nur frontend + backend und published sie auf 127.0.0.1-Ports.
# Der vorhandene Proxy routet myhub.adogan.de → diese Ports (analog zu den
# anderen Apps der VM, die ebenfalls auf 127.0.0.1:<port> liegen).
#
# Standalone (ohne eigenen Proxy)? → docker-compose.yml (bringt eigenen Caddy mit).
#
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Voraussetzung in .env: VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY
# (siehe docs/DEPLOY_VM.md). Ports unten ggf. an freie Host-Ports anpassen.

services:
  frontend:
    build:
      context: ./frontend
      args:
        # VITE-Vars werden ins Bundle gebacken (Build-Zeit) — aus .env interpoliert.
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    container_name: myhub-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:80"        # Host-Caddy proxyt hierher (statische SPA)

  backend:
    build: ./backend
    container_name: myhub-backend
    restart: unless-stopped
    env_file: .env
    environment:
      LOG_FILE_PATH: ${LOG_FILE_PATH:-/app/logs/app.log}
    volumes:
      - backend_logs:/app/logs
    ports:
      - "127.0.0.1:4000:4000"      # Host-Caddy proxyt /api/* hierher

volumes:
  backend_logs:
